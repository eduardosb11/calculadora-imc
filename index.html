<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>
    <link rel="stylesheet" href="estilo.css">
    <script src="script.js" defer></script>
</head>

<body>
    <header>
        <h1>Calculadora de Índice de Massa Corporal (IMC)</h1>
    </header>

    <body>
        <form>
            <label for="peso">
                Peso (KG):
                <input type="number" name="peso" id="peso" required min="0" max="999" step="0.1">
            </label>
            <label for="altura">
                Altura (Metros):
                <input type="number" name="altura" id="altura" required min="0" max="9" step="0.01">
            </label>
            <input type="submit" value="calcular">
        </form>
        
        <section>
            <p id="imc-calculado"></p>
            <p id="imc-classificacao"></p>
        </section>
    </body>

    <footer></footer>
</body>

</html>
